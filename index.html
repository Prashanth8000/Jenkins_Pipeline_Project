<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docker Practice</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            color:white;
        }

        .container{
            background:rgba(255,255,255,0.12);
            padding:40px;
            border-radius:15px;
            text-align:center;
            backdrop-filter:blur(8px);
            box-shadow:0 8px 20px rgba(0,0,0,0.3);
            width:500px;
        }

        h1{
            font-size:40px;
            margin-bottom:15px;
        }

        h2{
            color:#00ff99;
            margin-bottom:20px;
        }

        p{
            font-size:18px;
            margin:10px 0;
        }

        .badge{
            display:inline-block;
            margin-top:20px;
            padding:10px 20px;
            background:#00ff99;
            color:#000;
            border-radius:30px;
            font-weight:bold;
        }

        footer{
            margin-top:30px;
            font-size:14px;
            color:#ddd;
        }
    </style>
</head>
<body>

<div class="container">

    <h1>🐳 Docker Practice</h1>

    <h2>Container is Running Successfully!</h2>

    <p>Welcome to Docker.</p>

    <p>This webpage is served from inside a Docker container.</p>

    <div class="badge">
        Docker + Nginx 🚀
    </div>

    <footer>
        Created for Docker Practice
    </footer>

</div>

</body>
</html>
